model:
  bert_model_name: "bert-base-uncased"
  freeze_bert: true
  output_dim: 512
  dropout: 0.1

usda:
  features_path: "data/processed/usda_features.parquet"
  descriptions_path: "data/processed/usda_descriptions.json"
  scaler_path: "data/processed/usda_scaler.json"
  score_cutoff: 70
  cache_size: 2000
  nutrient_ids: [1008,1003,1004,1005,1079,1093,1253,
                 1258,1087,1089,1162,1106,1109,1110,
                 1180,1175,1178]

training:
  phase1_epochs: 5
  phase2_epochs: 10
  lr_head: 1.0e-3
  lr_bert: 1.0e-5
  lr_projection: 1.0e-4
  weight_decay: 1.0e-2
  max_norm: 1.0
  batch_size: 32
  num_workers: 4

paths:
  sr_legacy_dir: "data/usda/sr_legacy"
  foundation_dir: "data/usda/foundation"
  processed_dir: "data/processed"
  model_dir: "models"
  checkpoint: "models/nlp_best.pth"

ner:
  spacy_model: "en_core_web_sm"
  fallback: "comma_split"
